<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9FAFB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F4F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.5" fill="rgba(0,0,0,0.04)" />
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentGrad)" />

  <!-- Decorative circles top-right -->
  <circle cx="1050" cy="80" r="200" fill="none" stroke="rgba(52,211,153,0.08)" stroke-width="1" />
  <circle cx="1050" cy="80" r="150" fill="none" stroke="rgba(52,211,153,0.12)" stroke-width="1" />
  <circle cx="1050" cy="80" r="100" fill="none" stroke="rgba(52,211,153,0.16)" stroke-width="1" />

  <!-- Decorative circles bottom-left -->
  <circle cx="-50" cy="580" r="180" fill="none" stroke="rgba(52,211,153,0.06)" stroke-width="1" />
  <circle cx="-50" cy="580" r="120" fill="none" stroke="rgba(52,211,153,0.1)" stroke-width="1" />

  <!-- Logo icon (scaled up from brand mark) -->
  <g transform="translate(80, 255) scale(1.8)" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M28.0,-1.0 C27.1,-1.6 24.8,-0.2 23.0,2.1 C21.2,4.4 20.6,6.7 21.6,7.2 M21.6,7.2 C22.5,7.8 24.8,6.4 26.6,4.1 C28.4,1.8 29.0,-0.4 28.0,-1.0 Z" />
    <path d="M19.0,-12.0 C18.1,-12.6 15.1,-11.2 12.1,-8.5 C9.0,-5.7 7.0,-2.5 8.0,-1.9 L18.0,4.9 C19.0,5.5 22.0,4.1 25.1,1.3 C28.1,-1.4 30.1,-4.6 29.1,-5.2 L19.0,-12.0 Z" />
    <path d="M11.0,-17.0 C10.1,-17.6 7.1,-16.2 4.1,-13.5 C1.0,-10.7 -1.0,-7.5 0.0,-6.9 M0.0,-6.9 L10.0,-0.1 C11.0,0.5 14.0,-0.9 17.1,-3.7 C20.1,-6.4 22.1,-9.6 21.1,-10.2 M21.1,-10.2 L11.0,-17.0 Z M10.0,-0.1 L-0.0,-6.9" />
    <path d="M-8.0,-14.0 C-8.9,-14.6 -12.9,-11.9 -17.0,-7.8 C-21.1,-3.7 -23.7,0.2 -22.8,0.8 L-12.8,7.6 C-11.9,8.2 -8.9,6.8 -5.8,4.1 C-2.7,1.4 -0.7,-1.8 0.2,-2.4 L-12.8,7.6" />
    <path d="M-18.0,-9.0 C-18.9,-9.6 -22.9,-6.9 -27.0,-2.8 C-31.1,1.3 -33.7,5.2 -32.8,5.8 L-22.8,12.6 C-21.9,13.2 -17.9,10.5 -13.8,6.4 C-9.7,2.3 -7.1,-1.6 -8.0,-2.2" />
  </g>

  <!-- Brand name -->
  <text x="230" y="275" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="42" fill="#1A1A1A" letter-spacing="-1">SOLID</text>
  <text x="230" y="300" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="14" fill="#9CA3AF" letter-spacing="4" text-anchor="start">SOLUTIONS</text>

  <!-- Divider line -->
  <line x1="230" y1="330" x2="530" y2="330" stroke="url(#lineGrad)" stroke-width="2" />

  <!-- Tagline -->
  <text x="230" y="370" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" fill="#1A1A1A">AI, Cloud &amp; Web</text>
  <text x="230" y="405" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" fill="#1A1A1A">Systems for</text>
  <text x="230" y="440" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="28" fill="#34d399">African SMEs</text>

  <!-- Bottom tagline -->
  <text x="230" y="490" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="16" fill="#6B7280">Building Africa's Technology Future</text>

  <!-- URL -->
  <text x="230" y="570" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#9CA3AF">solidsolutions.africa</text>

  <!-- Right side: Feature icons -->
  <g transform="translate(750, 180)">
    <!-- AI -->
    <rect x="0" y="0" width="180" height="120" rx="12" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.2)" stroke-width="1" />
    <text x="90" y="45" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="14" fill="#34d399" text-anchor="middle">AI AGENTS</text>
    <text x="90" y="70" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">7+ Sector-Specific</text>
    <text x="90" y="90" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">Agents</text>

    <!-- Cloud -->
    <rect x="210" y="0" width="180" height="120" rx="12" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.2)" stroke-width="1" />
    <text x="300" y="45" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="14" fill="#34d399" text-anchor="middle">CLOUD</text>
    <text x="300" y="70" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">28+ Tools &amp;</text>
    <text x="300" y="90" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">Integrations</text>

    <!-- Web -->
    <rect x="0" y="150" width="180" height="120" rx="12" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.2)" stroke-width="1" />
    <text x="90" y="195" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="14" fill="#34d399" text-anchor="middle">WEB SYSTEMS</text>
    <text x="90" y="220" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">React, Vite,</text>
    <text x="90" y="240" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">Tailwind</text>

    <!-- SME -->
    <rect x="210" y="150" width="180" height="120" rx="12" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.2)" stroke-width="1" />
    <text x="300" y="195" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="14" fill="#34d399" text-anchor="middle">SME FIRST</text>
    <text x="300" y="220" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">50+ Businesses</text>
    <text x="300" y="240" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="12" fill="#6B7280" text-anchor="middle">Served</text>
  </g>
</svg>
