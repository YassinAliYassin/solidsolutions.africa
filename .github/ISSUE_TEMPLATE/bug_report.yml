name: Bug report
description: Report something broken on the site or in the codebase
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: The chat widget does not open on mobile Safari…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: The chat widget should open when tapped…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps help us reproduce faster.
      placeholder: |
        1. Go to https://solidsolutions.africa on iPhone
        2. Tap the chat button
        3. See error…
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: Chrome 131 on Android 14, iPhone 15 / Safari 18, etc.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop images here if helpful.
    validations:
      required: false