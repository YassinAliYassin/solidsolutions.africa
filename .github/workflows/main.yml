name: Auto Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -la dist/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Live DNS: solidsolutions.africa → 102.208.231.11 (cPanel user solidsol).
      # Use lftp's built-in SFTP (password auth). Do not shell out to OpenSSH —
      # this host rejects pubkey and OpenSSH never offers password.
      # Avoid wiping public_html (addon-domain folders may live there).
      - name: Deploy to cPanel via SFTP
        timeout-minutes: 10
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_HOST: 102.208.231.11
          DEPLOY_USER: solidsol
          DEPLOY_PATH: public_html
        run: |
          if [ -z "$FTP_PASSWORD" ]; then
            echo "FTP_PASSWORD secret is empty" >&2
            exit 1
          fi
          # Quote carefully: password contains ; and !
          lftp -c "
            set sftp:auto-confirm yes
            set net:max-retries 2
            set net:timeout 60
            set cmd:fail-exit yes
            open -u '${DEPLOY_USER}','${FTP_PASSWORD}' sftp://${DEPLOY_HOST}
            cd ${DEPLOY_PATH}
            mirror --reverse --verbose --parallel=4 dist/assets assets
            mirror --reverse --verbose dist/images images
            put dist/index.html -o index.html
            bye
          "
          if [ -f dist/.htaccess ]; then
            lftp -c "
              set sftp:auto-confirm yes
              set cmd:fail-exit yes
              open -u '${DEPLOY_USER}','${FTP_PASSWORD}' sftp://${DEPLOY_HOST}
              cd ${DEPLOY_PATH}
              put dist/.htaccess -o .htaccess
              bye
            "
          fi

      - name: Verify Deployment
        run: |
          sleep 5
          curl -skI --max-time 30 --resolve solidsolutions.africa:443:102.208.231.11 https://solidsolutions.africa/ | head -8 || true
          echo "Deploy complete — https://solidsolutions.africa"
