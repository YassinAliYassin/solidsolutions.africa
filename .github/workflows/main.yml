name: Auto Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -R dist

      - name: Deploy to cPanel via SFTP
        run: |
          rm -rf /tmp/solid-solutions-deploy
          mkdir -p /tmp/solid-solutions-deploy
          cp -r dist/* /tmp/solid-solutions-deploy/
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -o StrictHostKeyChecking=no -r /tmp/solid-solutions-deploy/* solid@102.208.231.15:/home/solid/solidsolutions.africa/