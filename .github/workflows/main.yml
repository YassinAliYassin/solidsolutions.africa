name: Auto Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -R dist

      - name: Install lftp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Deploy to cPanel via SFTP
        timeout-minutes: 10
        run: |
          lftp -c "
          set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no';
          set net:max-retries 5;
          set net:timeout 30;
          set net:reconnect-interval-base 2;
          set net:reconnect-interval-multiplier 1;
          open -u solidsol,${{ secrets.FTP_PASSWORD }} sftp://102.208.231.15;
          cd solidsolutions.africa;
          mirror --reverse --delete --verbose ./dist .;
          bye
          "

      - name: Verify Deployment
        run: echo "Deployed to cPanel successfully"
