name: Auto Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -la dist/

      - name: Deploy to cPanel via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 102.208.231.15
          username: solid
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "dist/**"
          target: "/home/solidsol/public_html/"
          strip_components: 1
          overwrite: true
          rm: true

      - name: Verify Deployment
        run: echo "Deploy complete — https://solidsolutions.africa"
