name: Auto Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -la dist/ && test -f dist/index.html

      # Primary production host while Webway cPanel (zacp111) is offline.
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel secrets (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID)" >&2
            exit 1
          fi
          npm install -g vercel@latest
          # Deploy pre-built dist/ (framework-less static output)
          vercel deploy dist --prod --yes --token="$VERCEL_TOKEN"

      # Best-effort legacy cPanel path (zacp111 may be down).
      - name: Install lftp
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to cPanel via SFTP (optional)
        continue-on-error: true
        timeout-minutes: 5
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_HOST: 102.208.231.11
          DEPLOY_USER: solidsol
          DEPLOY_PATH: public_html
        run: |
          if [ -z "$FTP_PASSWORD" ]; then
            echo "FTP_PASSWORD secret empty — skipping cPanel deploy"
            exit 0
          fi
          if ! timeout 8 bash -c "echo >/dev/tcp/${DEPLOY_HOST}/22" 2>/dev/null; then
            echo "cPanel host ${DEPLOY_HOST} unreachable — skipping"
            exit 0
          fi
          lftp -c "
            set sftp:auto-confirm yes
            set net:max-retries 1
            set net:timeout 20
            set cmd:fail-exit yes
            open -u '${DEPLOY_USER}','${FTP_PASSWORD}' sftp://${DEPLOY_HOST}
            cd ${DEPLOY_PATH}
            mirror --reverse --verbose --parallel=4 dist/assets assets
            mirror --reverse --verbose dist/images images
            put dist/index.html -o index.html
            bye
          " || echo "cPanel SFTP failed (host may still be down)"

      - name: Verify Deployment
        run: |
          sleep 3
          echo "=== Vercel alias ==="
          curl -sI --max-time 20 https://solidsolutions-africa.vercel.app/ | head -8 || true
          echo "=== Custom domain ==="
          curl -sI --max-time 20 https://solidsolutions.africa/ | head -8 || true
