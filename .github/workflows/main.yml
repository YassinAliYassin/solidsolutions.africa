name: Auto Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -la dist/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Live DNS for solidsolutions.africa → 102.208.231.11 (cPanel solidsol).
      # Password SFTP works; SSH key auth does not on this host.
      # Avoid full public_html wipe (addon-domain folders may live there).
      - name: Deploy to cPanel via SFTP
        timeout-minutes: 10
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          DEPLOY_HOST: 102.208.231.11
          DEPLOY_USER: solidsol
          DEPLOY_PATH: public_html
        run: |
          if [ -z "$FTP_PASSWORD" ]; then
            echo "FTP_PASSWORD secret is empty" >&2
            exit 1
          fi
          lftp <<EOF
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          set net:max-retries 3
          set net:timeout 90
          open -u "${DEPLOY_USER}","${FTP_PASSWORD}" sftp://${DEPLOY_HOST}
          cd ${DEPLOY_PATH}
          mirror --reverse --verbose --parallel=4 dist/assets assets
          mirror --reverse --verbose dist/images images
          put dist/index.html -o index.html
          bye
          EOF
          if [ -f dist/.htaccess ]; then
            lftp <<EOF
            set sftp:auto-confirm yes
            set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            open -u "${DEPLOY_USER}","${FTP_PASSWORD}" sftp://${DEPLOY_HOST}
            cd ${DEPLOY_PATH}
            put dist/.htaccess -o .htaccess
            bye
            EOF
          fi

      - name: Verify Deployment
        run: |
          sleep 5
          curl -skI --max-time 30 --resolve solidsolutions.africa:443:102.208.231.11 https://solidsolutions.africa/ | head -8 || true
          echo "Deploy complete — https://solidsolutions.africa"
