name: Auto Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -la dist/

      - name: Deploy to cPanel via rsync/SSH
        timeout-minutes: 10
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H zacp111.webway.host >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            dist/ solidsol@zacp111.webway.host:public_html/

      - name: Verify Deployment
        run: |
          sleep 5
          curl -skI --max-time 30 --resolve solidsolutions.africa:443:102.208.231.11 https://solidsolutions.africa/ | head -5 || true
          echo "Deploy complete — https://solidsolutions.africa"