name: Auto Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -R dist

      - name: Deploy to cPanel via SFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -c "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; open -u solid,${{ secrets.FTP_PASSWORD }} sftp://102.208.231.15; mirror --reverse --delete ./dist/ /home/solid/solidsolutions.africa/; bye"