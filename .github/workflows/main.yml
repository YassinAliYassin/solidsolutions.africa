name: Auto Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify Build
        run: ls -la dist/

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy to cPanel via SFTP
        timeout-minutes: 10
        run: |
          lftp -c "
          set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -o ConnectTimeout=20';
          set net:max-retries 3;
          set net:timeout 30;
          open -u solidsol,${{ secrets.FTP_PASSWORD }} sftp://zacp111.webway.host;
          cd public_html;
          mirror -R dist/ . --delete --verbose --exclude .git/ --exclude .git;
          bye
          "

      - name: Verify Deployment
        run: |
          sleep 5
          curl -skI --max-time 30 --resolve solidsolutions.africa:443:102.208.231.15 https://solidsolutions.africa/ | head -5 || true
          echo "Deploy complete — https://solidsolutions.africa"