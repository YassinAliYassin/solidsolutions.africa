name: GitHub Pages Mirror

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Deploy to gh-pages
        run: |
          git fetch origin gh-pages --depth=1 || true
          git checkout --orphan gh-pages-deploy
          git reset --hard
          # Only publish the production build — never node_modules or source
          cp -r dist/. .
          # Custom domain for GitHub Pages (apex DNS must point at GitHub or be unused)
          echo "solidsolutions.africa" > CNAME
          touch .nojekyll
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "deploy: mirror production build from main"
          git push origin HEAD:gh-pages --force
